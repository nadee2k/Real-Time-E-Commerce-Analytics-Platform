apiVersion: 1

datasources:
  - name: Postgres-Ecommerce
    type: postgres
    access: proxy
    url: postgres:5432
    user: analytics
    secureJsonData:
      password: analytics
    jsonData:
      database: ecommerce
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
      maxOpenConns: 50
      maxIdleConns: 10
      connMaxLifetime: 14400
